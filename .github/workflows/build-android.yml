name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ccache \
            git \
            libffi-dev \
            libssl-dev \
            openjdk-17-jdk \
            unzip \
            zip \
            zlib1g-dev

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer

      - name: Build APK with Buildozer
        run: |
          rm -rf .buildozer/
          rm -rf ~/.buildozer/
          rm -rf ~/.local/share/pythonforandroid/
          echo "Starting verbose build compilation loop..."
          
          # Define the target paths for both layout locations
          PATH_A="$HOME/.buildozer/android/platform/android-sdk/licenses"
          PATH_B="$GITHUB_WORKSPACE/.buildozer/android/platform/android-sdk/licenses"
          
          # Initialize directory trees cleanly
          mkdir -p "$PATH_A"
          mkdir -p "$PATH_B"
          
          # The official Google Android SDK License agreement hashes
          HASHES=$(cat << 'EOF'
          24333f1a69b12ffb283d85347b9f3d970085d547
          282d64f74d077b4159497d10902c41f609e25c04
          791207223403454d468e3f98299056c65f6b9f4e
          84831b9409646a918e30573bab4c9c91346d8abd
          504667f4c0de7af1a06de9578cfde3933036c547
          8933bad161af4178b1185d1a37fbf41ea5269c55
          EOF
          )
          
          # Write verification seeds natively into both configuration scopes
          echo "$HASHES" > "$PATH_A/android-sdk-license"
          echo "$HASHES" > "$PATH_B/android-sdk-license"
          
          export BUILDOZER_ACCEPT_LICENSE=1
          yes | buildozer --verbose android debug > build_output.log 2>&1 || BUILD_FAILED=true
          
          if [ "$BUILD_FAILED" = true ]; then
            echo "=================================================="
            echo "❌ BUILD FAILED! SHOWING FINAL 400 LINES OF LOG:"
            echo "=================================================="
            tail -n 400 build_output.log
            exit 1
          else
            echo "✅ Build completed successfully!"
          fi
        env:
          APP_ANDROID_ARCHS: armeabi-v7a,arm64-v8a
