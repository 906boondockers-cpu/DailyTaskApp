name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ccache \
            git \
            libffi-dev \
            libssl-dev \
            openjdk-17-jdk \
            unzip \
            zip \
            zlib1g-dev

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer

      - name: Build APK with Buildozer
        run: |
          rm -rf .buildozer/
          rm -rf ~/.buildozer/
          rm -rf ~/.local/share/pythonforandroid/
          echo "Starting verbose build compilation loop..."
          buildozer --verbose android debug > build_output.log 2>&1 || BUILD_FAILED=true
          if [ "$BUILD_FAILED" = true ]; then
            echo "=================================================="
            echo "❌ BUILD FAILED! SHOWING FINAL 400 LINES OF LOG:"
            echo "=================================================="
            tail -n 400 build_output.log
            exit 1
          else
            echo "✅ Build completed successfully!"
          fi
        env:
          APP_ANDROID_ARCHS: armeabi-v7a,arm64-v8a

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DailyTaskApp-APK
          path: bin/*.apk
