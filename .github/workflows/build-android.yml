name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Buildozer Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
            ~/.local/share/pythonforandroid
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ccache \
            git \
            libffi-dev \
            libssl-dev \
            unzip \
            zip \
            zlib1g-dev

      - name: Install Modern Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install "Cython>=3.0" "buildozer>=1.6.0"

      - name: Build APK with Buildozer
        run: |
          export ANDROID_HOME="/usr/local/lib/android/sdk"
          export ANDROID_SDK_ROOT="/usr/local/lib/android/sdk"
          export JAVA_HOME=$JAVA_HOME_17_X64
          
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          
          echo "Launching fast 16KB native aligned production build..."
          export BUILDOZER_ACCEPT_LICENSE=1
          
          export APP_ANDROID_API=34
          export APP_ANDROID_MINAPI=24
          export APP_ANDROID_NDK_VERSION=26b
          
          yes | buildozer --verbose android debug > build_output.log 2>&1 || BUILD_FAILED=true
          if [ "$BUILD_FAILED" = true ]; then
            echo "=================================================="
            echo "❌ BUILD FAILED! PRINTING SYSTEM COMPILER TRACE:"
            echo "=================================================="
            tail -n 250 build_output.log
            exit 1
          else
            echo "✅ Build completed successfully!"
          fi
        env:
          APP_ANDROID_ARCHS: arm64-v8a

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Curtsy-Stable-APK
          path: bin/*.apk
