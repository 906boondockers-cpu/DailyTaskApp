name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ccache \
            git \
            libffi-dev \
            libssl-dev \
            unzip \
            zip \
            zlib1g-dev

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer

      - name: Build APK with Buildozer
        run: |
          # 1. Hard purge old compilation artifacts completely
          rm -rf .buildozer/
          rm -rf ~/.buildozer/
          rm -rf ~/.local/share/pythonforandroid/
          
          # 2. Point cleanly to system runner SDK tools
          export ANDROID_HOME="/usr/local/lib/android/sdk"
          export ANDROID_SDK_ROOT="/usr/local/lib/android/sdk"
          export JAVA_HOME=$JAVA_HOME_17_X64
          
          # 3. Auto-sign Google package dependencies
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          
          echo "Starting forced modern API alignment build..."
          export BUILDOZER_ACCEPT_LICENSE=1
          
          # 4. Inject strict modern environment variables to completely overwrite spec bugs
          export APP_ANDROID_API=33
          export APP_ANDROID_MINAPI=24
          export APP_ANDROID_NDK_VERSION=25b
          
          # 5. Compile with explicit 16KB flags and architecture locks
          yes | buildozer --verbose android debug > build_output.log 2>&1 || BUILD_FAILED=true
          if [ "$BUILD_FAILED" = true ]; then
            echo "=================================================="
            echo "❌ BUILD FAILED! SHOWING CRITICAL ERROR LOGS:"
            echo "=================================================="
            tail -n 150 build_output.log
            exit 1
          else
            echo "✅ Build completed successfully!"
          fi
        env:
          APP_ANDROID_ARCHS: arm64-v8a

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Curtsy-ForcedAPI-APK
          path: bin/*.apk
